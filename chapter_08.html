<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Chapter 8 - The Martian">
    <meta name="theme-color" content="#c45028">
    <title>Chapter 8 - The Martian</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="#main" class="skip-link">Skip to content</a>
    
    <div class="progress" id="progress" aria-hidden="true"></div>
    
    <header class="header">
        <div class="header__inner">
            <a href="index.html" class="header__title">The Martian</a>
            <div class="controls" aria-hidden="true">
                <button class="btn btn--icon" id="font-toggle" aria-label="Change font size">Aa</button>
                <button class="btn btn--icon" id="theme-toggle" aria-label="Toggle theme">🌓</button>
            </div>
        </div>
    </header>
    
    <main id="main" class="main">
        <header class="chapter-header">
            <p class="chapter-header__number">Chapter 8</p>
            <h1 class="chapter-header__title">Chapter 8</h1>
        </header>
        
        
        <nav class="nav" aria-label="Chapter navigation">
            <a href="chapter_07.html" class="nav__link" aria-label="Previous chapter">← Prev</a>
            <span class="nav__current">8 / 26</span>
            <a href="chapter_09.html" class="nav__link" aria-label="Next chapter">Next →</a>
        </nav>
    </main>
    
    <footer class="footer">
        <p>Generated for mobile reading • TTS optimized</p>
    </footer>
    
    <script>
        // Theme toggle
        const themeToggle = document.getElementById('theme-toggle');
        const themes = ['light', 'dark', 'sepia'];
        let currentTheme = localStorage.getItem('theme') || 'light';
        
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            currentTheme = theme;
        }
        
        setTheme(currentTheme);
        
        themeToggle.addEventListener('click', () => {
            const nextIndex = (themes.indexOf(currentTheme) + 1) % themes.length;
            setTheme(themes[nextIndex]);
        });
        
        // Font size toggle
        const fontToggle = document.getElementById('font-toggle');
        const fontSizes = ['normal', 'large', 'xlarge', 'small'];
        let currentFontSize = localStorage.getItem('fontsize') || 'normal';
        
        function setFontSize(size) {
            document.documentElement.setAttribute('data-fontsize', size);
            localStorage.setItem('fontsize', size);
            currentFontSize = size;
        }
        
        setFontSize(currentFontSize);
        
        fontToggle.addEventListener('click', () => {
            const nextIndex = (fontSizes.indexOf(currentFontSize) + 1) % fontSizes.length;
            setFontSize(fontSizes[nextIndex]);
        });
        
        // Reading progress
        const progress = document.getElementById('progress');
        
        function updateProgress() {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = (scrollTop / docHeight) * 100;
            progress.style.width = scrollPercent + '%';
        }
        
        window.addEventListener('scroll', updateProgress, { passive: true });
        updateProgress();
    </script>
</body>
</html>
